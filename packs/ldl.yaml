id: ldl
name: LDL Cholesterol
panel: lipid
aliases: [ldl, ldl cholesterol, low density lipoprotein, ldl-c]
unit: mg/dL
fallback_ranges:
  normal: [0.0, 99.0]
  borderline: [100.0, 159.0]
  abnormal: [160.0, 500.0]
explanation: >
  LDL is the "bad" cholesterol — high levels build up in artery walls. Below 100 mg/dL
  is optimal; 100-159 is near-to-borderline high; 160 and above is high. Lowering LDL
  reduces the long-term risk of heart disease. It is part of the lipid profile.
sources:
  - https://medlineplus.gov/lab-tests/cholesterol-levels/
